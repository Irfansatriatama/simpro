<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — SIMPRO</title>
  <script>
    (function() {
      const t = localStorage.getItem('sp_theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3B5BDB" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#4C6EF5" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/projects.css">
  <link rel="stylesheet" href="/assets/css/task.css">
  <link rel="stylesheet" href="/assets/css/polish.css">
</head>
<body data-page="projects">

<a href="#main-content" class="skip-to-main">Langsung ke konten</a>
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<div class="app-shell">
  <aside id="sidebar" class="sidebar" role="navigation" aria-label="Navigasi utama"></aside>
  <div class="main-area">
    <header class="topbar" role="banner"></header>
    <main class="main-content" id="main-content" role="main" tabindex="-1">

      <!-- Breadcrumb -->
      <div class="breadcrumb" id="breadcrumb">
        <a href="/pages/projects.html" class="breadcrumb-item">Projects</a>
        <span class="breadcrumb-sep"><i data-lucide="chevron-right" width="14" height="14"></i></span>
        <span class="breadcrumb-item active" id="breadcrumb-name">—</span>
      </div>

      <!-- Project Header -->
      <div class="project-detail-header" id="project-header">
        <div class="project-detail-title-row">
          <div class="project-color-dot" id="project-color-dot"></div>
          <h1 class="page-title" id="project-name">—</h1>
          <span class="badge badge-mono" id="project-key-badge">—</span>
          <span class="badge" id="project-status-badge">—</span>
        </div>
        <p class="page-subtitle" id="project-desc-text"></p>
        <div class="project-detail-actions" id="project-actions"></div>
      </div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="overview">
          <i data-lucide="bar-chart-2" width="14" height="14"></i> Overview
        </button>
        <button class="tab-btn" data-tab="members">
          <i data-lucide="users" width="14" height="14"></i> Members
        </button>
        <button class="tab-btn" data-tab="settings" id="tab-settings-btn">
          <i data-lucide="settings" width="14" height="14"></i> Settings
        </button>
      </div>

      <!-- Tab: Overview -->
      <div class="tab-panel active" id="panel-overview">
        <div class="overview-stats" id="overview-stats"></div>
        <div class="overview-grid">
          <div class="overview-col">
            <div class="card" id="card-sprint-active">
              <div class="card-header"><h3 class="card-title">Sprint Aktif</h3></div>
              <div class="card-body" id="sprint-active-body"></div>
            </div>
          </div>
          <div class="overview-col">
            <div class="card" id="card-milestones">
              <div class="card-header">
                <h3 class="card-title">Milestones</h3>
              </div>
              <div class="card-body" id="milestones-body"></div>
            </div>
          </div>
          <div class="overview-col overview-col-full">
            <div class="card" id="card-time-summary">
              <div class="card-header"><h3 class="card-title">Waktu per Member</h3></div>
              <div class="card-body" id="time-summary-body"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab: Members -->
      <div class="tab-panel hidden" id="panel-members">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Member Project</h3>
            <button class="btn btn-primary btn-sm" id="btn-invite-member" style="display:none;">
              <i data-lucide="user-plus" width="14" height="14"></i> Undang Member
            </button>
          </div>
          <div class="card-body" id="members-table-body"></div>
        </div>
      </div>

      <!-- Tab: Settings -->
      <div class="tab-panel hidden" id="panel-settings">
        <div class="card" style="max-width:560px;">
          <div class="card-header"><h3 class="card-title">Pengaturan Project</h3></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label" for="setting-name">Nama Project</label>
              <input type="text" id="setting-name" class="input" maxlength="80">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="setting-key">Key</label>
                <input type="text" id="setting-key" class="input input-mono" maxlength="5" style="text-transform:uppercase;">
              </div>
              <div class="form-group">
                <label class="form-label" for="setting-priority">Priority</label>
                <select id="setting-priority" class="input select">
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                  <option value="critical">Critical</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="setting-desc">Deskripsi</label>
              <textarea id="setting-desc" class="input textarea" rows="3"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Warna</label>
              <div class="color-picker-row" id="settings-color-row">
                <div class="color-swatch" data-color="#3B5BDB" style="background:#3B5BDB;"></div>
                <div class="color-swatch" data-color="#2F9E44" style="background:#2F9E44;"></div>
                <div class="color-swatch" data-color="#C92A2A" style="background:#C92A2A;"></div>
                <div class="color-swatch" data-color="#E67700" style="background:#E67700;"></div>
                <div class="color-swatch" data-color="#7048E8" style="background:#7048E8;"></div>
                <div class="color-swatch" data-color="#1971C2" style="background:#1971C2;"></div>
                <div class="color-swatch" data-color="#2C7A7B" style="background:#2C7A7B;"></div>
                <div class="color-swatch" data-color="#5C6070" style="background:#5C6070;"></div>
                <input type="color" id="setting-color" class="color-custom-input" title="Warna custom">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="setting-start">Tanggal Mulai</label>
                <input type="date" id="setting-start" class="input">
              </div>
              <div class="form-group">
                <label class="form-label" for="setting-end">Tanggal Selesai</label>
                <input type="date" id="setting-end" class="input">
              </div>
            </div>
            <div id="settings-form-error" class="form-error hidden"></div>
            <div class="form-footer">
              <button class="btn btn-primary" id="btn-settings-save">Simpan Perubahan</button>
            </div>
          </div>
        </div>

        <div class="card danger-zone" style="max-width:560px;margin-top:var(--sp-4);">
          <div class="card-header"><h3 class="card-title" style="color:var(--color-danger);">Danger Zone</h3></div>
          <div class="card-body">
            <div class="danger-action">
              <div>
                <div class="text-sm fw-500">Arsipkan Project</div>
                <div class="text-xs text-muted">Project akan disembunyikan dari tampilan utama.</div>
              </div>
              <button class="btn btn-ghost btn-sm" id="btn-settings-archive">Arsipkan</button>
            </div>
            <div class="danger-action" style="margin-top:var(--sp-3);">
              <div>
                <div class="text-sm fw-500" style="color:var(--color-danger);">Hapus Project</div>
                <div class="text-xs text-muted">Hapus permanen project beserta semua task dan data terkait.</div>
              </div>
              <button class="btn btn-danger btn-sm" id="btn-settings-delete">Hapus</button>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Modal: Invite Member -->
<div class="modal-overlay hidden" aria-hidden="true" id="modal-invite">
  <div class="modal modal-sm" role="dialog" aria-labelledby="modal-invite-title">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-invite-title">Undang Member</h2>
      <button class="modal-close" id="modal-invite-close" aria-label="Tutup">
        <i data-lucide="x" width="18" height="18"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label" for="invite-user-select">Pilih User</label>
        <select id="invite-user-select" class="input select">
          <option value="">— Pilih user —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="invite-role-select">Role dalam Project</label>
        <select id="invite-role-select" class="input select">
          <option value="developer">Developer</option>
          <option value="viewer">Viewer</option>
          <option value="pm">Project Manager</option>
        </select>
      </div>
      <div id="invite-form-error" class="form-error hidden"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-invite-cancel">Batal</button>
      <button class="btn btn-primary" id="btn-invite-save">Undang</button>
    </div>
  </div>
</div>

<script src="/assets/js/core/utils.js"></script>
<script src="/assets/js/core/storage.js"></script>
<script src="/assets/js/core/app.js"></script>
<script src="/assets/js/core/auth.js"></script>
<script src="/assets/js/core/router.js"></script>
<script src="/assets/js/core/shell.js"></script>
<script src="/assets/js/modules/project.js"></script>
<script src="/assets/js/modules/comment.js"></script>
<script src="/assets/js/modules/label.js"></script>
<script src="/assets/js/modules/task.js"></script>
<script src="/assets/js/modules/timelog.js"></script>
<script src="/assets/js/modules/notification.js"></script>
<script src="/assets/js/modules/task-modal.js"></script>
<script src="/assets/js/pages/project-detail.js"></script>
<script>
  Auth.requireAuth();
  Shell.applyTo('projects', 'Project Detail');
  App.init('projects');
  ProjectDetailPage.init();
</script>
</body>
</html>
