<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — SIMPRO</title>
  <script>
    (function() {
      const t = localStorage.getItem('sp_theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3B5BDB" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#4C6EF5" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/projects.css">
  <link rel="stylesheet" href="../assets/css/polish.css">
</head>
<body data-page="projects">

<a href="#main-content" class="skip-to-main">Langsung ke konten</a>
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<div class="app-shell">
  <aside id="sidebar" class="sidebar" role="navigation" aria-label="Navigasi utama"></aside>
  <div class="main-area">
    <header class="topbar" role="banner"></header>
    <main class="main-content" id="main-content" role="main" tabindex="-1">
      <div class="page-header">
        <div>
          <h1 class="page-title">Projects</h1>
          <p class="page-subtitle" id="project-count-label">Memuat...</p>
        </div>
        <div class="page-header-actions">
          <div class="filter-group">
            <button class="btn btn-ghost btn-sm filter-btn active" data-filter="active">Aktif</button>
            <button class="btn btn-ghost btn-sm filter-btn" data-filter="all">Semua</button>
            <button class="btn btn-ghost btn-sm filter-btn" data-filter="archived">Arsip</button>
          </div>
          <div class="view-toggle">
            <button class="btn btn-ghost btn-sm view-btn active" data-view="grid" title="Grid view">
              <i data-lucide="layout-grid" width="16" height="16"></i>
            </button>
            <button class="btn btn-ghost btn-sm view-btn" data-view="list" title="List view">
              <i data-lucide="list" width="16" height="16"></i>
            </button>
          </div>
          <button class="btn btn-primary btn-sm" id="btn-new-project" style="display:none;">
            <i data-lucide="plus" width="16" height="16"></i> New Project
          </button>
        </div>
      </div>

      <div id="projects-grid" class="projects-grid"></div>
      <div id="projects-list" class="projects-list hidden"></div>
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <p class="empty-title" id="empty-title">Belum ada project</p>
        <p class="empty-desc" id="empty-desc">Buat project pertamamu untuk mulai mengelola task dan sprint.</p>
        <button class="btn btn-primary btn-sm" id="btn-new-project-empty" style="display:none;">
          <i data-lucide="plus" width="16" height="16"></i> Buat Project
        </button>
      </div>
    </main>
  </div>
</div>

<!-- Modal: Create/Edit Project -->
<div class="modal-overlay hidden" aria-hidden="true" id="modal-project">
  <div class="modal modal-md" role="dialog" aria-labelledby="modal-project-title">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-project-title">New Project</h2>
      <button class="modal-close" id="modal-project-close" aria-label="Tutup">
        <i data-lucide="x" width="18" height="18"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-error hidden" id="project-form-error"></div>

      <div class="form-row">
        <div class="form-group" style="flex:2;">
          <label class="form-label" for="input-project-name">Nama Project <span class="required">*</span></label>
          <input type="text" id="input-project-name" class="input" placeholder="Contoh: Website Redesign" maxlength="80">
        </div>
        <div class="form-group" style="flex:1;">
          <label class="form-label" for="input-project-key">Key <span class="required">*</span></label>
          <input type="text" id="input-project-key" class="input input-mono" placeholder="WR" maxlength="5" style="text-transform:uppercase;">
          <span class="form-hint">2–5 huruf kapital, unik</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-project-desc">Deskripsi</label>
        <textarea id="input-project-desc" class="input textarea" placeholder="Deskripsi singkat project..." rows="2"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="input-project-priority">Priority</label>
          <select id="input-project-priority" class="input select">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Warna</label>
          <div class="color-picker-row" id="color-picker-row">
            <div class="color-swatch active" data-color="#3B5BDB" style="background:#3B5BDB;"></div>
            <div class="color-swatch" data-color="#2F9E44" style="background:#2F9E44;"></div>
            <div class="color-swatch" data-color="#C92A2A" style="background:#C92A2A;"></div>
            <div class="color-swatch" data-color="#E67700" style="background:#E67700;"></div>
            <div class="color-swatch" data-color="#7048E8" style="background:#7048E8;"></div>
            <div class="color-swatch" data-color="#1971C2" style="background:#1971C2;"></div>
            <div class="color-swatch" data-color="#2C7A7B" style="background:#2C7A7B;"></div>
            <div class="color-swatch" data-color="#5C6070" style="background:#5C6070;"></div>
            <input type="color" id="input-project-color" value="#3B5BDB" class="color-custom-input" title="Warna custom">
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="input-project-start">Tanggal Mulai</label>
          <input type="date" id="input-project-start" class="input">
        </div>
        <div class="form-group">
          <label class="form-label" for="input-project-end">Tanggal Selesai</label>
          <input type="date" id="input-project-end" class="input">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-project-cancel">Batal</button>
      <button class="btn btn-primary" id="btn-project-save">Simpan</button>
    </div>
  </div>
</div>

<script src="../assets/js/core/utils.js"></script>
<script src="../assets/js/core/storage.js"></script>
<script src="../assets/js/core/app.js"></script>
<script src="../assets/js/core/auth.js"></script>
<script src="../assets/js/core/router.js"></script>
<script src="../assets/js/modules/notification.js"></script>
<script src="../assets/js/core/shell.js"></script>
<script src="../assets/js/modules/project.js"></script>
<script src="../assets/js/pages/projects.js"></script>
<script>
  Auth.requireAuth();
  Shell.applyTo('projects', 'Projects');
  App.init('projects');
  ProjectsPage.init();
</script>
</body>
</html>
