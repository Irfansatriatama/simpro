<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gantt Chart — SIMPRO</title>
  <script>
    (function() {
      const t = localStorage.getItem('sp_theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/gantt.css">
</head>
<body data-page="gantt">

<div id="sidebar-overlay" class="sidebar-overlay"></div>

<div class="app-shell">
  <aside id="sidebar" class="sidebar"></aside>
  <div class="main-area">
    <header class="topbar"></header>
    <main class="main-content" id="main-content" style="padding:0;display:flex;flex-direction:column;overflow:hidden;height:calc(100vh - var(--topbar-height));">
      <div id="gantt-toolbar" class="gantt-toolbar"></div>
      <div id="gantt-container" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></div>
    </main>
  </div>
</div>

<div id="toast-container"></div>

<script src="/assets/js/core/utils.js"></script>
<script src="/assets/js/core/storage.js"></script>
<script src="/assets/js/core/auth.js"></script>
<script src="/assets/js/core/app.js"></script>
<script src="/assets/js/core/router.js"></script>
<script src="/assets/js/core/shell.js"></script>
<script src="/assets/js/modules/project.js"></script>
<script src="/assets/js/modules/task.js"></script>
<script src="/assets/js/modules/comment.js"></script>
<script src="/assets/js/modules/label.js"></script>
<script src="/assets/js/modules/milestone.js"></script>
<script src="/assets/js/modules/gantt.js"></script>
<script src="/assets/js/pages/gantt.js"></script>
<script>
  Auth.requireAuth();
  Shell.applyTo('gantt', 'Gantt Chart');
  App.init('gantt').then(() => {
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
    if (window.lucide) lucide.createIcons();
    if (typeof Page !== 'undefined' && Page.init) Page.init();
  });
</script>
</body>
</html>
