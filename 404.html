<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — SIMPRO</title>
  <script>
    (function() {
      const t = localStorage.getItem('sp_theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh;
      font-family: var(--font-sans); }
    .wrap { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .code { font-size: 72px; font-weight: 800; color: var(--color-border-strong); line-height: 1; letter-spacing: -4px; }
    .title { font-size: 20px; font-weight: 600; color: var(--color-text); }
    .desc { font-size: 14px; color: var(--color-text-2); max-width: 320px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; background: var(--color-accent);
      color: #fff; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer;
      text-decoration: none; transition: background 150ms; }
    .btn:hover { background: var(--color-accent-hover); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="title">Halaman tidak ditemukan</div>
    <p class="desc">Halaman yang kamu cari tidak ada atau sudah dipindahkan.</p>
    <a href="/index.html" class="btn">Kembali ke Beranda</a>
  </div>
</body>
</html>
